# ByteDrive 全部参数默认值（唯一数据来源）。
# 实现文件只读本文件，不得二次声明默认值。换实验/环境只改这里或用 <env>.yaml 覆盖。

# ============================================================
# carla_collector —— Carla 合成数据采集模块
# ============================================================
carla_collector:

  # Py37 worker 子进程与 Carla 服务端连接
  worker:
    python_exe: data/carla_data_collector/py37_venv/Scripts/python.exe  # 派生 Py37 子进程的解释器
    carla_host: 127.0.0.1
    carla_port: 2000
    startup_timeout_s: 60.0    # 等待 worker 就绪 / 连上 Carla 的上限
    command_timeout_s: 120.0   # 单条控制命令的响应上限（加载地图较慢，故放宽）

  # 跨进程数据面：匿名共享内存 arena（既是传输通道也是场景内存缓冲）
  ipc:
    arena_name: bytedrive_carla_arena  # Windows mmap tagname 前缀
    arena_size_mb: 1024                # 单段（一次 flush）的内存批大小；写满即落一段并清空续采，不再是场景帧上限
    slot_count: 1000                   # 预留字段，当前 BumpAllocator 不使用（vestigial）

  # 仿真世界
  simulation:
    map: Town01_Opt          # 仅支持 Opt 地图
    fixed_delta_seconds: 0.1  # 同步模式固定步长（10Hz）
    warmup_ticks: 30           # 场景正式采集前空转帧，待物理/交通稳定

  # 路线队列：可达点两两组合，按直线距离过滤后去重
  route:
    min_distance_m: 80.0
    max_distance_m: 300.0
    max_scenes: 0              # 限制路线（行驶）条数上限，0 表示遍历全部合法组合；注意每条行驶可能切成多个场景段
    queue_seed: 20260617       # 组合随机排序的种子（保证队列可复现）

  # 交通流（TrafficManager 控制）
  traffic:
    num_vehicles: 30
    num_walkers: 20
    vehicle_filter: vehicle.*
    walker_filter: walker.pedestrian.*
    walker_running_pct: 0.1          # 行人奔跑比例
    walker_arrival_radius_m: 2.0     # 行人到目标点的判定半径，进入即重派新目标（持续漫游）
    tm_port: 8000

  # 天气
  weather:
    randomize: false

  # 主车（BehaviorAgent 控制）
  ego:
    behavior: normal           # cautious / normal / aggressive
    vehicle_filter: vehicle.lincoln.mkz_2020

  # 相机阵列：分辨率全局共享；rig 决定相机数量，并分别配置各视角的 FOV 与外参
  cameras:
    width: 384
    height: 192
    # 各相机模态开关：关闭即不创建对应相机、不落盘。同视角各模态共享 FOV/位姿、像素逐点对齐。
    modalities:
      rgb: true            # RGB 相机 → mp4；关闭则该场景无视频文件
      depth: true          # 深度相机（BGR 编码）→ 解码为米存 LMDB
      semantic: true       # 语义分割相机 → 单通道标签存 LMDB
      optical_flow: true   # 光流相机 sensor.camera.optical_flow，输出 (H,W,2) float32 运动矢量 → LMDB
    rig:                       # 默认 6 视；fov/yaw 为度，x 前向、y 右向、z 上向（米）
      - {name: front,       fov: 90.0, x: 1.5,  y: 0.0,  z: 1.6, roll: 0.0, pitch: 0.0, yaw: 0.0}
      # - {name: front_far,   fov: 60.0, x: 1.5,  y: 0.0,  z: 1.6, roll: 0.0, pitch: 0.0, yaw: 0.0}
      # - {name: front_left,  fov: 90.0, x: 1.2,  y: -0.5, z: 1.6, roll: 0.0, pitch: 0.0, yaw: -45.0}
      # - {name: front_right, fov: 90.0, x: 1.2,  y: 0.5,  z: 1.6, roll: 0.0, pitch: 0.0, yaw: 45.0}
      # - {name: left,        fov: 90.0, x: 0.0, y: -1.0, z: 1.6, roll: 0.0, pitch: 0.0, yaw: -120.0}
      # - {name: right,       fov: 90.0, x: 0.0, y: 1.0, z: 1.6, roll: 0.0, pitch: 0.0, yaw: 120.0}
      # - {name: back,        fov: 120.0, x: -1.8, y: 0.0, z: 1.6, roll: 0.0, pitch: 0.0, yaw: 180.0}

  # 语义分割 Lidar（sensor.lidar.ray_cast_semantic）
  lidar:
    enabled: false              # 语义 Lidar 总开关，关闭则不创建、LMDB 无 lidar 键
    channels: 64
    range_m: 100.0
    points_per_second: 1300000
    rotation_frequency: 10.0   # 与 1/fixed_delta_seconds 对齐，保证每帧一整圈
    upper_fov: 10.0
    lower_fov: -30.0
    x: 0.0
    y: 0.0
    z: 1.8

  # 单次行驶采集控制
  collection:
    max_frames_per_scene: 2048   # 整次行驶的总帧上限（跨多段累计）；达到即结束行驶。单段大小由 ipc.arena_size_mb 决定
    capture_every_n_ticks: 5     # 每多少个仿真步采一帧

  # 碰撞重试
  collision:
    max_retries_per_route: 0   # 同一路线换种子重试上限；超限则跳过该路线

  # 落盘输出（每个场景一个自包含目录 scenes/scene_XXXXXX/：7 个 mp4 + 独立 lmdb/）
  output:
    root: data/carla_data_collector/dataset
    lmdb_map_size_gb: 64       # 单场景 LMDB 的增长上限（按需增长，初始仅 64MB；非全量上限）
    video_codec: libx265       # H.265
    video_crf: 23
    video_fps: 2               # mp4 帧率（通常 = 1/fixed_delta_seconds）

# ============================================================
# data_vis —— 采集数据集可视化（vis 模块下的数据可视化子模块）
# 只读消费 carla_collector 的输出。注意：vis 模块下其余渲染/日志部分尚未开发，
# 故本节配置仅针对 data_vis 子模块，不代表整个 vis 模块。
# ============================================================
data_vis:
  scene_root: data/carla_data_collector/dataset/scenes  # 场景目录的默认搜索根（含 scene_XXXXXX/）

  display:
    scale: 0.6                 # 合成画布整体缩放（多相机横排很宽，缩小便于单屏查看）
    play_fps: 2                # 自动播放帧率（默认对齐采集 fps，可调快慢）
    window_name: ByteDrive 数据可视化

  traffic_lights:
    nearest_count: 3           # HUD 除全场状态统计外，显示距主车最近的 N 盏灯；0 表示只显示统计

  # 3D 包围框投影到 RGB 的样式
  bbox:
    thickness: 2
    max_distance_m: 100.0      # 距相机超过此值的框不画，抑制远处线框堆叠
    draw_static: false         # 静态环境框数量极大（近千），默认关；按 's' 临时开
    colors:                    # 语义 -> BGR（仅这几类需手调，故进 config）
      ego:        [0, 255, 255]
      vehicle:    [0, 200, 0]
      pedestrian: [0, 128, 255]
      env:        [160, 160, 160]

  # 深度图着色
  depth:
    max_display_m: 80.0        # 着色量程上限（米），超过即截断到最远色
    colormap: turbo            # 取值见 vis/draw.py 的 colormap 表（turbo/jet/magma/viridis）

  # 光流着色（色相编码方向、亮度编码幅值）
  optical_flow:
    max_flow: 0.0              # 满亮度对应的光流幅值（CARLA 光流单位）；0=按帧自适应（取幅值 99 分位）

  # 鸟瞰图（以主车为中心的俯视）
  bev:
    range_m: 50.0              # 可视半边长（米）：画面覆盖主车四周 ±range_m
    size_px: 600               # BEV 方形边长（像素）
    point_radius: 1            # lidar 点绘制半径
    color_by: tag              # tag(按语义) / height(按高度)
    bg: [20, 20, 20]           # 背景 BGR

  lidar:
    max_points_draw: 200000    # BEV 单帧最多绘制点数（超出则等距下采样，保护渲染帧率）

# ============================================================
# model —— 网络结构参数（model/ 实现文件只读本节，不得二次声明默认值）
# ============================================================
model:

  # DINOv3 ViT-B/16 视觉骨干（全程冻结 + eval），逐帧输出 patch 网格特征
  dinov3_backbone:
    model_dir: model/dinov3-vitb16-pretrain-lvd1689m  # 本地权重目录（相对仓库根）
    patch_size: 16            # ViT patch 边长；384×192 输入 → 24×12 patch 网格
    hidden_dim: 768           # 骨干输出通道（师生头共享的特征维度）
    num_register_tokens: 4    # DINOv3 ViT-B 的 register token 数（序列切片下界校验用）

  # 时序主干：DINO 逐帧特征先 1×1×1 投影降维，再堆成 5 帧时序过 6 层 ConvNeXt 风格 3D 卷积块
  temporal_trunk:
    in_channels: 768          # 主干输入通道（= 骨干 hidden_dim），投影前的维度
    channels: 384             # 投影后 ConvNeXt 工作通道；主干内此维恒定，也是喂给三头的输出维
    num_blocks: 6             # ConvNeXt 3D 块层数
    temporal_kernel: 3        # 深度可分离卷积时间核（T 方向），pad=(k-1)/2 保持 5 帧
    spatial_kernel: 5         # 深度可分离卷积空间核（H/W 方向，5×5）
    expansion: 2              # 1×1×1 逐点卷积的通道膨胀率

  # 三头解码：各含 1 层 3D 残差块 + 级联像素洗牌上采样至原分辨率（通道逐级压低省显存）
  heads:
    reduce_channels: 128      # 残差块后 1×1×1 把主干输出 384 压到的头内起始通道 C0
    up_channels: [96, 64, 32, 16]   # 四级 2× 像素洗牌各级输出通道（12×24 → 192×384）
    num_classes: 29           # 语义分割类别数（CARLA CityScapes tag 0..28）
    semantic_out: 29          # 语义头输出通道（= num_classes logits）
    flow_out: 2               # 光流头输出通道（图像平面速度 vx,vy 的 scale·symlog）
    depth_out: 2              # 深度头输出通道（ch0=深度 scale·symlog，ch1=范围内 BCE logit）

  # 物理量监督口径：Symlog 空间 + 缩放，深度范围裁剪，光流→速度换算
  physics:
    symlog_scale: 0.14285714  # 目标 = symlog_scale · symlog(x)，symlog(x)=sign(x)·ln(1+|x|)
    depth_max_m: 128.0        # 深度检测上限（米）；超出记为超范围，仅监督二分类
    flow_dt_s: 0.1            # 光流换算速度用的时间步 = 仿真 fixed_delta_seconds（每 tick 渲染）
    flow_ndc_pixel_scale: [192.0, 96.0]  # 归一化光流→像素位移的有符号缩放 [W/2, H/2]
    semantic_ignore_index: 0  # 交叉熵忽略的语义标签（0=Unlabeled）

  # 目标点嵌入层：ego 目标点 → 栅格向量场 → 三层卷积下采样 → 目标导航点 Token
  target_point_embedding:
    coordinate_dim: 2          # 目标点坐标维度，固定为 ego 平面 [x, y]
    grid_height: 64            # 栅格高度，对应 x 前后方向格数
    grid_width: 64             # 栅格宽度，对应 y 左右方向格数
    x_min_m: -32.0             # 栅格后向边界（米）
    x_max_m: 32.0              # 栅格前向边界（米）
    y_min_m: -32.0             # 栅格右向边界（米）
    y_max_m: 32.0              # 栅格左向边界（米）
    vector_order: grid_minus_target   # 向量场方向：栅格中心 - 目标点
    vector_transform: symlog          # 送入卷积前对米制向量的变换（当前仅 symlog）
    feature_channels: 64       # 卷积中间通道数
    conv1_kernel_size: [3, 3]  # 第一层卷积核 [H, W]
    conv1_stride: [2, 2]
    conv1_padding: [1, 1]
    conv2_kernel_size: [3, 3]  # 第二层卷积核 [H, W]
    conv2_stride: [2, 2]
    conv2_padding: [1, 1]
    downsample_kernel_size: [3, 3]   # 下采样卷积核 [H, W]
    downsample_stride: [2, 2]
    downsample_padding: [1, 1]
    output_height: 8           # 三层卷积后栅格高度（由上面卷积参数推导，schema 加载期校验一致）
    output_width: 8            # 三层卷积后栅格宽度
    goal_token_count: 2        # 输出目标导航点 Token 数
    hidden_dim: 768            # 每个目标导航点 Token 维度（对齐视觉编码器 768）
    flatten_order: channel_height_width   # 卷积输出展平顺序（当前仅 channel_height_width）
    dtype: float32             # 目标点嵌入层强制运行精度（当前仅 float32）

# ============================================================
# data —— 数据读取与预处理（data/ 实现文件只读本节，从 config 取参）
# ============================================================
data:

  # 感知模型的时序开窗数据集：只读消费 carla_collector 落盘的场景
  dataset:
    scene_root: data/carla_data_collector/dataset/scenes  # 场景目录搜索根（含 scene_XXXXXX/）
    camera: front             # 使用的相机名（当前数据集单相机）
    window_size: 5            # 每个样本的历史帧数（时序长度 T）
    window_stride: 5          # 相邻窗口起点间隔（=window_size 即不重叠）
    # DINOv3 ImageNet 归一化（RGB 先除 255 到 [0,1] 再标准化）；本地无 preprocessor_config，故写此处
    dino_mean: [0.485, 0.456, 0.406]
    dino_std: [0.229, 0.224, 0.225]

# ============================================================
# train —— 训练 / 优化 / 评估循环（train/ 实现文件只读本节）
# ============================================================
train:
  device: cuda               # 训练设备；autocast 设备类型由输入张量所在设备推导
  epochs: 10
  batch_size: 2
  num_workers: 4
  lr: 0.00005                # 5e-5
  weight_decay: 0.00001      # 1e-5
  grad_clip_norm: 1.0        # 梯度裁剪上限（0 表示不裁剪）
  log_every: 20              # 每多少步打印一次损失
  ckpt_dir: train/checkpoints   # 权重保存目录（相对仓库根）
  resume: true               # 断点续训：为真则自动从 ckpt_dir 下最新检查点恢复（模型+优化器+epoch）
  # 多任务损失加权求和：语义 CE / 深度 SmoothL1 / 深度范围 BCE / 光流 SmoothL1
  loss_weights:
    semantic: 1.0
    depth: 1.0
    depth_range: 1.0
    flow: 1.0

# ============================================================
# pred_vis —— 感知模型预测可视化（加载权重，渲染三头预测，可并列 GT）
# ============================================================
pred_vis:
  checkpoint: train/checkpoints/epoch_010.pt  # 要加载的检查点（不存在则随机初始化并告警）
  scene: ''                  # 指定场景目录名（如 scene_000000）；空=取 scene_root 下第一个
  max_windows: 4             # 最多渲染多少个窗口（0=全部）
  save_dir: vis/pred_vis/out # 渲染结果保存目录（相对仓库根）
  show_ground_truth: true    # 是否并列渲染 GT 行，便于与预测对照
  display_scale: 0.5         # 合成画布整体缩放（多帧多模态很大，缩小便于查看）
  depth_colormap: turbo      # 深度着色 colormap（turbo/jet/magma/viridis/plasma/inferno）
  depth_max_display_m: 128.0 # 深度着色量程上限（米），对齐检测范围
  flow_max_display: 0.0      # 光流(速度)满亮度幅值（m/s）；0=按帧幅值 99 分位自适应
